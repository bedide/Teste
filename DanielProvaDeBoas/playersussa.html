<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Boas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="iconefechar">

            <button onclick="fechar()" class="botaofechar">
                <img src="imagens/Icons/fechar.png" class="iconfechar">                
            </button>
        </header>

        <div class="quadrado">
            <img src="imagens/BobHome/BobSussa.png" class="bobsussa">
        </div>

        <div class="tempo">
            <span id="tempoAtual">00:00</span>
            <span id="tempoFinal">1:00</span>
        </div>

        <div class="barra">
            <div class="progresso" id="progresso"></div>
        </div>

        <div class="play" onclick="togglePlay()">
            <img src="imagens/Icons/botao-play.png" id="iconePlay">
        </div>

        <div class="objetivoPlayer">
            <p>FICAR SUSSA</p>
        </div>

        <button class="btn">NOME DO <br> OBJETIVO</button>
    </div>
    <script src="js/playersussa.js"></script>
</body>
</html>
