<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Boas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="player">
        <h2 id="objetivoNome">FOCAR NA TAREFA<h2>
        <img id="bobPlayer" src="imagens/BobHome/BobFoco.png">

        <!--barra de progresso-->

        <div class="barra">
            <div class="progresso" id="progresso"></div>
        </div>

        <!-- tempos -->

        <div class="tempos">
            <span id="tempoDecorrido">0:00</span>
            <span id="tempoRestante">1:00</span>
        </div>

        <!-- botoes -->

        <div class="controles">
            <button onclick="playPause()" id="botaoPlay">PLAY</button>
            <button onclick="cancelar()">CANCELAR</button>
        </div>

        <audio id="audio">
            <source src="audio/meditacao.mp3" type="audio/mpeg">
        </audio>
    </section>
    <script src="js/player2.js"></script>
</body>
</html>
